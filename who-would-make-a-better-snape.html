<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Would Make A Better Snape — Imagine Fun</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
            /* dark dungeon-like atmosphere */
            background-image: radial-gradient(ellipse at 50% 0%, #1a1a2e 0%, #0a0a0a 70%);
        }

        header {
            text-align: center;
            padding: 3rem 1rem 1rem;
        }

        header h1 {
            font-family: 'Crimson Text', serif;
            font-size: 2.8rem;
            color: #c4c4c4;
            font-style: italic;
        }

        header h1 span {
            color: #4ade80;
            font-style: normal;
        }

        header p {
            color: #4ade8088;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-family: 'Crimson Text', serif;
        }

        .back {
            display: inline-block;
            margin: 1rem 2rem;
            color: #4ade80;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back:hover {
            text-decoration: underline;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #22222a;
            transition: transform 0.3s, box-shadow 0.3s;
            aspect-ratio: 3/4;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.2rem 0.75rem 0.75rem;
            background: linear-gradient(transparent, rgba(10, 10, 10, 0.95));
            font-family: 'Crimson Text', serif;
            font-size: 1.1rem;
            color: #c4c4c4;
            text-align: center;
            font-style: italic;
        }

        .vs {
            text-align: center;
            font-family: 'Crimson Text', serif;
            font-size: 1.4rem;
            color: #4ade8066;
            padding: 1rem;
            letter-spacing: 0.5em;
        }
    </style>
</head>

<body>
    <a class="back" href="index.html">← Back to Imagine Fun</a>
    <header>
        <h1>Who Would Make A Better <span>Snape</span>?</h1>
        <p>The contenders</p>
    </header>
    <div class="gallery">
        <div class="gallery-item"><img src="Who Would Make A Better Snape/Joel_Mchale_Ca2009_0010.jpg"
                alt="Joel McHale">
            <div class="label">Joel McHale</div>
        </div>
        <div class="gallery-item"><img src="Who Would Make A Better Snape/Nathan_Fillion_Ca2002_0009.jpg"
                alt="Nathan Fillion">
            <div class="label">Nathan Fillion</div>
        </div>
        <div class="gallery-item"><img src="Who Would Make A Better Snape/Rob_Lowe_Ca2000_0005.jpg" alt="Rob Lowe">
            <div class="label">Rob Lowe</div>
        </div>
    </div>
</body>

</html>
